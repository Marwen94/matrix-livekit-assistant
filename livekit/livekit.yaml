# ── LIVEKIT CONFIGURATION ──────────────────────────────────────────

port: 7880
bind_addresses:
  - ""

# Logging
logging:
  level: info

# WebRTC configuration
rtc:
  tcp_port: 7881
  port_range_start: 50400
  port_range_end: 50500
  use_external_ip: true

# TURN server configuration
turn:
  enabled: true
  udp_port: 3478

# Room settings
room:
  empty_timeout: 300
  max_participants: 50
